version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: resumind-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: akhil123
      MYSQL_DATABASE: resumind
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build:
      context: ./backend
    container_name: resumind-backend
    restart: always
    environment:
      MYSQL_DSN: root:akhil123@tcp(db:3306)/resumind?parseTime=true
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-akhil123jwtsecretkeyresumind32chars}
      PORT: 8080
      UPLOADS_DIR: ./uploads
    depends_on:
      - db
    volumes:
      - uploads-data:/app/uploads

  frontend:
    build:
      context: .
      args:
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID}
    container_name: resumind-frontend
    restart: always
    environment:
      PORT: 3000
    depends_on:
      - backend

  proxy:
    image: nginx:alpine
    container_name: resumind-proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  mysql-data:
  uploads-data:
